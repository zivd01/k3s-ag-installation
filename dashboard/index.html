<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K3s Native Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .select-styled {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            backdrop-filter: blur(10px);
            cursor: pointer;
            min-width: 200px;
        }

        .select-styled option {
            background: var(--bg-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }

        .card h3 {
            margin-top: 0;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            backdrop-filter: blur(12px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.875rem;
            background: rgba(0, 0, 0, 0.2);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .text-success { color: var(--success); }
        .text-warning { color: var(--warning); }
        .text-danger { color: var(--danger); }
        
        .namespace-tag {
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            color: var(--accent);
        }

        .node-info span {
            display: block;
            margin-top: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>K3s Observatory</h1>
            <p id="last-updated" style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.875rem;">Waiting for data...</p>
        </div>
        <div id="conn-status" class="status-badge error">
            <div class="pulse"></div> Connecting...
        </div>
    </div>

    <!-- Filters -->
    <div class="controls">
        <select id="namespace-filter" class="select-styled">
            <option value="all">All Namespaces</option>
        </select>
        <select id="status-filter" class="select-styled">
            <option value="all">All Pod Statuses</option>
            <option value="running">Running / Completed</option>
            <option value="failing">Failing / Pending / Error</option>
        </select>
    </div>

    <!-- High level Nodes info -->
    <div class="grid" id="nodes-container">
        <!-- Rendered via JS -->
    </div>

    <!-- Pods Table -->
    <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Workloads (Pods)</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Namespace</th>
                    <th>Name</th>
                    <th>Node</th>
                    <th>Status</th>
                    <th>Restarts</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody id="pods-tbody">
                <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Loading pods...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Events Table -->
    <h2 style="font-size: 1.25rem; margin-top: 2rem; margin-bottom: 1rem;">Recent Cluster Warnings</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Namespace</th>
                    <th>Component</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="events-tbody">
                <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Loading events...</td></tr>
            </tbody>
        </table>
    </div>


    <script>
        let k3sData = null;

        function fetchMetrics() {
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    k3sData = data;
                    document.getElementById('conn-status').className = 'status-badge';
                    document.getElementById('conn-status').innerHTML = '<div class="pulse"></div> Live';
                    document.getElementById('last-updated').innerText = 'Last updated: ' + new Date(data.timestamp).toLocaleTimeString();
                    renderDashboard();
                })
                .catch(err => {
                    console.error("Failed to fetch K3s data", err);
                    document.getElementById('conn-status').className = 'status-badge error';
                    document.getElementById('conn-status').innerHTML = '<div class="pulse"></div> Disconnected';
                });
        }

        // Initialize fetching
        fetchMetrics();
        setInterval(fetchMetrics, 3000);

        // UI Event Listeners
        document.getElementById('namespace-filter').addEventListener('change', renderDashboard);
        document.getElementById('status-filter').addEventListener('change', renderDashboard);

        function calculateAge(creationTimestamp) {
            const diffMs = new Date() - new Date(creationTimestamp);
            const diffDays = Math.floor(diffMs / 86400000); // days
            const diffHrs = Math.floor((diffMs % 86400000) / 3600000); // hours
            const diffMins = Math.round(((diffMs % 86400000) % 3600000) / 60000); // minutes
            return diffDays > 0 ? `${diffDays}d ${diffHrs}h` : `${diffHrs}h ${diffMins}m`;
        }

        function renderDashboard() {
            if (!k3sData) return;

            const nsFilter = document.getElementById('namespace-filter').value;
            const statusFilter = document.getElementById('status-filter').value;

            // 1. Populate Namespace filter dynamically if empty
            const nsSelect = document.getElementById('namespace-filter');
            if(nsSelect.options.length === 1) {
                const namespaces = new Set(k3sData.pods.items.map(p => p.metadata.namespace));
                Array.from(namespaces).sort().forEach(ns => {
                    const opt = document.createElement('option');
                    opt.value = ns;
                    opt.innerText = ns;
                    nsSelect.appendChild(opt);
                });
            }

            // 2. Render Nodes
            const nodesContainer = document.getElementById('nodes-container');
            nodesContainer.innerHTML = '';
            k3sData.nodes.items.forEach(node => {
                const isReady = node.status.conditions.find(c => c.type === 'Ready')?.status === 'True';
                const color = isReady ? 'text-success' : 'text-danger';
                
                // Memory capacity calculations
                const memKiStr = node.status.capacity.memory.replace('Ki','');
                const memGB = (parseInt(memKiStr) / 1024 / 1024).toFixed(1);

                nodesContainer.innerHTML += `
                <div class="card node-info">
                    <h3>Node: ${node.metadata.name}</h3>
                    <span class="${color}">${isReady ? 'Ready' : 'Not Ready'}</span>
                    <div style="margin-top: 1rem; display: flex; gap: 1rem; color: var(--text-muted); font-size: 0.875rem;">
                        <div>💻 CPU: ${node.status.capacity.cpu} Cores</div>
                        <div>🧠 RAM: ${memGB} GB</div>
                        <div>🔧 Roles: ${Object.keys(node.metadata.labels).filter(l => l.includes('node-role')).map(l => l.split('/')[1] || 'agent').join(', ')}</div>
                    </div>
                    <div style="margin-top: 0.5rem; color: var(--text-muted); font-size: 0.875rem;">
                        Kubelet: ${node.status.nodeInfo.kubeletVersion} | OS: ${node.status.nodeInfo.osImage}
                    </div>
                </div>`;
            });

            // 3. Render Pods
            const podsTbody = document.getElementById('pods-tbody');
            podsTbody.innerHTML = '';
            
            let filteredPods = k3sData.pods.items.filter(pod => {
                const nsMatch = (nsFilter === 'all') || (pod.metadata.namespace === nsFilter);
                
                let sMatch = true;
                const phase = pod.status.phase; // Running, Pending, Succeeded, Failed, Unknown
                if (statusFilter === 'running') sMatch = ['Running', 'Succeeded'].includes(phase);
                if (statusFilter === 'failing') sMatch = !['Running', 'Succeeded'].includes(phase);
                
                return nsMatch && sMatch;
            });

            if (filteredPods.length === 0) {
                podsTbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No workloads matched your filters.</td></tr>`;
            } else {
                // Sort by namespace then name
                filteredPods.sort((a,b) => a.metadata.namespace.localeCompare(b.metadata.namespace) || a.metadata.name.localeCompare(b.metadata.name));
                
                filteredPods.forEach(pod => {
                    const statusColor = ['Running', 'Succeeded'].includes(pod.status.phase) ? 'text-success' 
                        : (pod.status.phase === 'Pending' ? 'text-warning' : 'text-danger');
                    
                    let restarts = 0;
                    if(pod.status.containerStatuses) {
                        restarts = pod.status.containerStatuses.reduce((acc, c) => acc + c.restartCount, 0);
                    }

                    podsTbody.innerHTML += `
                    <tr>
                        <td><span class="namespace-tag">${pod.metadata.namespace}</span></td>
                        <td style="font-weight: 600;">${pod.metadata.name}</td>
                        <td style="color: var(--text-muted);">${pod.spec.nodeName || 'Scheduling...'}</td>
                        <td class="${statusColor}" style="font-weight: 600;">${pod.status.phase}</td>
                        <td>${restarts > 0 ? `<span class="text-warning">${restarts}</span>` : '0'}</td>
                        <td>${calculateAge(pod.metadata.creationTimestamp)}</td>
                    </tr>`;
                });
            }

            // 4. Render Events (Warnings)
            const eventsTbody = document.getElementById('events-tbody');
            eventsTbody.innerHTML = '';
            
            const eventItems = k3sData.events?.items?.[0] || k3sData.events?.items || [];
            if(Array.isArray(eventItems)) {
                const warnings = eventItems.filter(e => e?.type === 'Warning').reverse();
                if(warnings.length === 0) {
                    eventsTbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--success);">No warnings found in the cluster cluster!</td></tr>`;
                } else {
                    warnings.slice(0,10).forEach(ev => {
                        eventsTbody.innerHTML += `
                        <tr>
                            <td style="white-space: nowrap;">${new Date(ev.lastTimestamp || ev.eventTime || ev.metadata.creationTimestamp).toLocaleTimeString()}</td>
                            <td><span class="namespace-tag">${ev.involvedObject.namespace || 'default'}</span></td>
                            <td>${ev.involvedObject.name}</td>
                            <td class="text-danger">${ev.message}</td>
                        </tr>`;
                    });
                }
            }
        }
    </script>
</body>
</html>
